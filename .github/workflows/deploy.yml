name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      working-directory: ./jtcool-server
      run: mvn clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Images
      working-directory: ./jtcool-server
      run: |
        docker build -f Dockerfile.admin -t ${{ secrets.DOCKER_USERNAME }}/jtcool-admin:latest .
        docker build -f Dockerfile.assister -t ${{ secrets.DOCKER_USERNAME }}/jtcool-assister:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/jtcool-admin:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/jtcool-assister:latest

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/jtcool
          docker pull ${{ secrets.DOCKER_USERNAME }}/jtcool-admin:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/jtcool-assister:latest
          docker-compose up -d
