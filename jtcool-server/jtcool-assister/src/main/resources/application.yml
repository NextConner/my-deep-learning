langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_CHAT_MODEL:llama3.2:3b}
      temperature: ${OLLAMA_TEMPERATURE:0.0}  # 路由判断要确定性输出，温度设为0
      timeout: ${OLLAMA_TIMEOUT:PT10S}    # 本地模型响应快，10秒足够

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0  # 开发环境全采样，生产环境改成 0.1
  otlp:
    tracing:
      endpoint: http://192.168.20.129:4318/v1/traces

resilience4j:
  circuitbreaker:
    instances:
      deepseek:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        register-health-indicator: true

app:
  enterprise:
    name: ${APP_ENTERPRISE_NAME:企业}
  models:
    primary:
      provider: ${APP_MODELS_PRIMARY_PROVIDER:openai-compatible}  # openai-compatible | anthropic
      base-url: ${APP_MODELS_PRIMARY_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY}
      model-name: ${APP_MODELS_PRIMARY_MODEL_NAME:deepseek-chat}
      max-tokens: ${APP_MODELS_PRIMARY_MAX_TOKENS:4096}
    fallback:
      provider: ${APP_MODELS_FALLBACK_PROVIDER:openai-compatible}
      base-url: ${APP_MODELS_FALLBACK_BASE_URL:http://localhost:11434/v1}
      api-key: ${APP_MODELS_FALLBACK_API_KEY:ollama}
      model-name: ${APP_MODELS_FALLBACK_MODEL_NAME:phi3:mini}
      max-tokens: ${APP_MODELS_FALLBACK_MAX_TOKENS:2048}
#    back:
#      provider: ${APP_MODELS_BACK_PROVIDER:anthropic}
#      api-key: ${ANTHROPIC_API_KEY}
#      model-name: ${APP_MODELS_BACK_MODEL_NAME:claude-sonnet-4-6}
#      max-tokens: ${APP_MODELS_BACK_MAX_TOKENS:4096}


# ========== 日志配置 ==========
logging:
  level:
    root: INFO
    com.example: DEBUG          # 指定包的日志级别

  file:
    name: logs/app.log            # 日志文件路径
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

  logback:
    rollingpolicy:
      max-file-size: 10MB         # 单文件最大 10MB（可选，用于 size+time 混合策略）
      max-history: 7              # 保留最近 7 天的日志文件
      total-size-cap: 20MB         # 所有归档日志总大小上限
      clean-history-on-start: true
