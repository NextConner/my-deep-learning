server:
  port: 8080

spring:
  application:
    name: java-ai-agent-monolith

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai-agent}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  # LLM provider config
  llm:
    provider: ${LLM_PROVIDER:deepseek} # openai / deepseek
    timeout-ms: ${LLM_TIMEOUT_MS:60000}

    # OpenAI compatible config
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4.1-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}

    # DeepSeek config
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}

    # Alibaba Bailian (百炼) Embedding config
    bailian:
      api-key: ${BAILIAN_API_KEY:}
      embedding-model: ${BAILIAN_EMBEDDING_MODEL:text-embedding-v3}
      base-url: ${BAILIAN_BASE_URL:https://dashscope.aliyuncs.com}

  # Vector store config
  vector:
    enabled: ${VECTOR_ENABLED:true}
    dimension: 1536  # for text-embedding-v3
