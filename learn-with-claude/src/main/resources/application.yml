server:
  port: 8080

spring:
  application:
    name: learn-from-claude
  datasource:
    url: jdbc:postgresql://172.30.44.143:5432/ragdb
    username: pgsql
    password: 123456
  jpa:
    hibernate:
      ddl-auto: none
  spring:
    security:
      strategy: MODE_INHERITABLETHREADLOCAL
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
logging:
  level:
    org.springframework.security: DEBUG

jwt:
  secret: K3v9mX8qR2tG7wP1nZ4sL6cB5jH0dFvN2yQ8uI3oA9xC6mV5nR7tG2wE9pL1qZ4sX6cB8jH0dFvN2yQ8uI3oA9x
  expiration: 86400000  # 24小时，单位毫秒
rag:
  chunk:
    max-segment-size: 300
    max-overlap-size: 30

agent:
  runtime:
    max-steps: 3
    step-timeout-ms: 15000
    retry-times: 1

# application.yml
#langchain4j:
#  openai:              # ← 不是 open-ai
#    chat-model:
#      base-url: https://api.deepseek.com
#      api-key: ${DEEPSEEK_API_KEY}
#      model-name: deepseek-chat

langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3.2:3b
      temperature: 0.0  # 路由判断要确定性输出，温度设为0
      timeout: PT10S    # 本地模型响应快，10秒足够

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0  # 开发环境全采样，生产环境改成 0.1
zipkin:
  tracing:
    endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  circuitbreaker:
    instances:
      deepseek:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        register-health-indicator: true

app:
  models:
    primary:
      provider: openai-compatible  # openai-compatible | anthropic
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      max-tokens: 4096
    fallback:
      provider: openai-compatible
      base-url: http://localhost:11434/v1
      api-key: ollama
      model-name: llama3.2:3b
      max-tokens: 2048
    back:
      provider: anthropic
      api-key: ${ANTHROPIC_API_KEY}
      model-name: claude-sonnet-4-6
      max-tokens: 4096